  <div class="card"><h3>Notifications</h3><button onclick="go('notifications.html')">Ouvrir</button></div>
  <div class="card"><h3>Commandes</h3><button onclick="go('commandes.html')">Voir</button></div>
  <div class="card"><h3>Messagerie</h3><button onclick="go('messagerie.html')">Ouvrir</button></div>
  <div class="card"><h3>Conseils IA</h3><button onclick="go('conseils-ia.html')">Consulter</button></div>
  <div class="card"><h3>Assistant IA</h3><button onclick="go('assistant.html')">Parler</button></div>
  <div class="card"><h3>Administration</h3><button onclick="go('admin.html')">Accéder</button></div>
  <div class="card"><h3>Connexion</h3><button onclick="go('login.html')">Se connecter</button></div>
  <div class="card"><h3>Inscription</h3><button onclick="go('register.html')">S'inscrire</button></div>
  <div class="card"><h3>Marché des prix</h3><button onclick="go('marche.html')">Voir prix</button></div>
  <div class="card"><h3>Entreprise</h3><button onclick="go('entreprise.html')">Voir</button></div></div><script>
function go(page){
  window.location.href = page;
}
</script></body>

<h1>Assistant IA Agricole</h1>
<input type="text" id="question" placeholder="Pose ta question...">
<button onclick="askAI()">Envoyer</button>
<p id="response"></p><script>
function askAI(){

}
