<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agriconnect</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#2e7d32;
color:white;
padding:15px;
}

.container{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

button{
padding:15px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>Agriconnect</h2>
</header>

<div class="container">

<div class="section">
<h2>Bienvenue sur Agriconnect</h2>

<p>
Plateforme digitale pour connecter agriculteurs, entreprises et acheteurs
afin de faciliter la vente et l'achat de produits agricoles.
</p>

</div>

<div class="section">
<h2>Services</h2>

<div class="grid">

<a href="produits.html">
<button id="btnAjouter">Ajouter produit</button>
</a>

<a href="comande.html">
<button id="btnAcheter">Acheter</button>
</a>

<a href="entreprises.html">
<button id="btnEntreprise">Entreprises</button>
</a>

<a href="chat-prive.html">
<button>Chat privé</button>
</a>

<a href="profil.html">
<button>Profil</button>
</a>

</div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// GESTION ROLE
let user = localStorage.getItem("user");

if(user){

db.collection("users").doc(user).get().then(doc=>{

let role = doc.data().role;

// cacher tout
document.getElementById("btnAjouter").style.display = "none";
document.getElementById("btnAcheter").style.display = "none";

// afficher selon rôle
if(role === "agriculteur"){
document.getElementById("btnAjouter").style.display = "block";
}

if(role === "acheteur"){
document.getElementById("btnAcheter").style.display = "block";
}

if(role === "entreprise"){
document.getElementById("btnAjouter").style.display = "block";
}

});

}

</script>

</body>
</html>
