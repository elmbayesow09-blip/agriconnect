<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AgriConnect Sénégal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #2e7d32, #66bb6a);
    color:white;
    text-align:center;
}

header {
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container {
    background:white;
    color:black;
    margin:30px auto;
    padding:20px;
    width:90%;
    max-width:600px;
    border-radius:10px;
}

button {
    padding:10px 20px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#1b5e20;
}

input, select {
    padding:8px;
    margin:5px;
    width:80%;
}
</style>
</head>

<body>

<header>🌾 AgriConnect Sénégal</header>

<div class="container">

<h2>🔎 Recherche d'entreprise</h2>

<select id="region">
<option value="Kaffrine">Kaffrine</option>
<option value="Kaolack">Kaolack</option>
<option value="Fatick">Fatick</option>
</select>
<br>
<button onclick="rechercher()">Rechercher</button>

<div id="resultat"></div>

<hr>

<h2>📝 Inscription Entreprise</h2>

<input type="text" id="nomEntreprise" placeholder="Nom de l'entreprise">
<br>
<input type="text" id="telephoneEntreprise" placeholder="Téléphone">
<br>
<select id="regionEntreprise">
<option value="Kaffrine">Kaffrine</option>
<option value="Kaolack">Kaolack</option>
<option value="Fatick">Fatick</option>
</select>
<br>
<button onclick="ajouterEntreprise()">Ajouter</button>

</div>

<script>

let entreprises = {
    Kaffrine: [],
    Kaolack: [],
    Fatick: []
};

function rechercher() {
    let region = document.getElementById("region").value;
    let resultat = document.getElementById("resultat");

    resultat.innerHTML = "";

    if (entreprises[region].length === 0) {
        resultat.innerHTML = "<p>Aucune entreprise trouvée.</p>";
        return;
    }

    entreprises[region].forEach(function(ent) {
        resultat.innerHTML += `
            <p><strong>${ent.nom}</strong><br>📞 ${ent.tel}</p>
        `;
    });
}

function ajouterEntreprise() {
    let nom = document.getElementById("nomEntreprise").value;
    let tel = document.getElementById("telephoneEntreprise").value;
    let region = document.getElementById("regionEntreprise").value;

    if (nom === "" || tel === "") {
        alert("Veuillez remplir tous les champs.");
        return;
    }

    entreprises[region].push({nom: nom, tel: tel});

    alert("Entreprise ajoutée avec succès !");

    document.getElementById("nomEntreprise").value = "";
    document.getElementById("telephoneEntreprise").value = "";
}

</script>

</body>
</html>
