<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mes commandes</title>
<style>
body { font-family: Arial; text-align:center; padding:50px; }
.card {
    background:#fff;
    padding:15px;
    margin:10px auto;
    width:300px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h2>Mes commandes 📦</h2>

<div id="liste"></div>

<br>
<a href="index.html">Retour</a>

<script>
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

let div = document.getElementById("liste");

if(commandes.length === 0){
    div.innerHTML = "Aucune commande pour le moment";
} else {
    commandes.forEach(c => {
        div.innerHTML += `
        <div class="card">
            <p><b>${c.produit}</b></p>
            <p>${c.prix} FCFA</p>
            <p>${c.date}</p>
        </div>
        `;
    });
}
</script>

</body>
</html>
