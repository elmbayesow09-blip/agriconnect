<!DOCTYPE html>
<html>
<head>
<title>Commandes</title>
</head>

<body>

<h1>Mes commandes</h1>

<div id="liste"></div>

<script>
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

let html="";

commandes.forEach(c=>{
html += "<p>"+c.produit+" - "+c.prix+" FCFA</p>";
});

document.getElementById("liste").innerHTML = html;
</script>

</body>
</html>
