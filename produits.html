<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produits agricoles</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* HEADER */
header{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}
</style>
</head>

<body>

<header>
<h1>📦 Produits agricoles</h1>
</header>

<div class="grid">

<!-- PRODUIT 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
<div class="card-content">
<h3>🌾 Riz local</h3>
<p>Prix : 5000 FCFA</p>
<button onclick="acheter('Riz',5000)">Acheter</button>
</div>
</div>

<!-- PRODUIT 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1603048719539-9ecb6f6a8d89">
<div class="card-content">
<h3>🌽 Maïs</h3>
<p>Prix : 3000 FCFA</p>
<button onclick="acheter('Maïs',3000)">Acheter</button>
</div>
</div>

<!-- PRODUIT 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1620574387735-3624d75b2dbc">
<div class="card-content">
<h3>🥜 Arachide</h3>
<p>Prix : 4000 FCFA</p>
<button onclick="acheter('Arachide',4000)">Acheter</button>
</div>
</div>

</div>

<script>
function acheter(produit, prix){
    alert("🛒 Vous avez choisi : " + produit + " (" + prix + " FCFA)");
}
</script>

</body>
</html>
