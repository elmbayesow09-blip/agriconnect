<div id="produits-container"></div>

<script>
// On récupère les produits depuis produits.json
fetch('produits.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('produits-container');
    data.forEach(produit => {
      // Crée une carte pour chaque produit
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="images/${produit.image}" alt="${produit.nom}" width="200">
        <h3>${produit.nom}</h3>
        <p>${produit.description}</p>
        <p><strong>${produit.prix}</strong></p>
      `;
      container.appendChild(card);
    });
  });
</script>
