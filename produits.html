<!DOCTYPE html>
<html>
<head>
    <title>Produits - Agriconnect</title>
    <style>
        body{
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1{
            color: green;
            margin-top: 20px;
        }
        #produits-container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .card{
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            width: 220px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card img{
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        .card button{
            background: green;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .card button:hover{
            background: darkgreen;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>Nos Produits</h1>

<div id="produits-container"></div>
