<!DOCTYPE html>
<html>
<head>
<title>Produits agricoles</title>
</head>

<body>

<h1>Produits agricoles</h1>

<div id="listeProduits"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4",
authDomain: "agriconnect-933f0.firebaseapp.com",
projectId: "agriconnect-933f0",
storageBucket: "agriconnect-933f0.appspot.com",
messagingSenderId: "1028061092951",
appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function chargerProduits(){

const querySnapshot=await getDocs(collection(db,"produits"));

querySnapshot.forEach((doc)=>{

let p=doc.data();

document.getElementById("listeProduits").innerHTML+=`

<div style="background:white;padding:20px;margin:20px;border-radius:10px">

<h3>${p.nom}</h3>

<p>${p.description}</p>

</div>

`;

});

}

chargerProduits();

</script>

</body>
</html>
