<!DOCTYPE html>
<html>
<head>
<title>Produits</title>
</head>

<body>

<h1>Ajouter produit</h1>

<input id="nom" placeholder="Nom produit">
<input id="prix" placeholder="Prix">

<button onclick="ajouter()">Ajouter</button>

<h2>Liste produits</h2>
<div id="liste"></div>

<script>

function ajouter(){

let user = localStorage.getItem("user");

if(!user){
alert("Connecte-toi");
return;
}

let nom = document.getElementById("nom").value;
let prix = document.getElementById("prix").value;

db.collection("produits").add({
nom: nom,
prix: prix,
user: user
});

}

db.collection("produits").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
let p = doc.data();

html += `
<p>
${p.nom} - ${p.prix} FCFA (par ${p.user})
<button onclick="modifier('${doc.id}')">Modifier prix</button>
</p>
`;
});

document.getElementById("liste").innerHTML = html;
});

function modifier(id){
let nouveau = prompt("Nouveau prix :");

db.collection("produits").doc(id).update({
prix: nouveau
});
}

</script>

</body>
</html>
