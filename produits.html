<!DOCTYPE html>
<html>
<head>
<title>Produits - Agriconnect</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
color:green;
}

#produits-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:220px;
}

.card img{
width:200px;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}
</style>

</head>

<body>

<h1>Nos Produits Agricoles 🌱</h1>
  <input type="text" id="search" placeholder="Rechercher un produit..." style="padding:10px; width:250px;">
  
<h2>Ajouter un produit</h2>

<input type="text" id="nom" placeholder="Nom du produit"><br><br>
<input type="text" id="description" placeholder="Description"><br><br>
<input type="text" id="prix" placeholder="Prix"><br><br>
<input type="text" id="image" placeholder="Nom de l'image (ex: tomate.jpg)"><br><br>

<button onclick="ajouterProduit()">Ajouter</button>

<hr>

<div id="produits-container"></div>

<script>
  
fetch('produits.json')
.then(response => response.json())
.then(data => {

const container = document.getElementById('produits-container');
const search = document.getElementById('search');

function afficherProduits(liste){

container.innerHTML="";

liste.forEach(produit => {

const card = document.createElement('div');
card.className="card";

card.innerHTML = `
<img src="images/${produit.image}">
<h3>${produit.nom}</h3>
<p>${produit.description}</p>
<p><b>${produit.prix}</b></p>
`;

container.appendChild(card);

});

}

afficherProduits(data);

search.addEventListener("input", () => {

const mot = search.value.toLowerCase();

const filtres = data.filter(p =>
p.nom.toLowerCase().includes(mot)
);

afficherProduits(filtres);

});

});
  
});

});

</script>

</body>
</html>
