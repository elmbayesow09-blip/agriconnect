<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Agriconnect - Produits</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:green;
}

#liste-produits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.produit{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.produit h3{
color:green;
}

</style>

</head>

<body>

<h1>Produits agricoles</h1>

<div id="liste-produits"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOuonPR7eesU7uRdvUBeF6UDci6ZD_2AQ",
  authDomain: "agriconnect-933f0.firebaseapp.com",
  projectId: "agriconnect-933f0",
  storageBucket: "agriconnect-933f0.firebasestorage.app",
  messagingSenderId: "1028061092951",
  appId: "1:1028061092951:web:66afa5dcf60dfeedfad712",
  measurementId: "G-XMG7WWF0VZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function chargerProduits(){

const querySnapshot = await getDocs(collection(db,"produits"));

const container = document.getElementById("liste-produits");

querySnapshot.forEach((doc)=>{

const produit = doc.data();

const div = document.createElement("div");
div.classList.add("produit");

div.innerHTML = `
<h3>${produit.nom}</h3>
<p>${produit.description}</p>
<p><strong>Prix :</strong> ${produit.prix} FCFA</p>
<p><strong>Téléphone :</strong> ${produit.telephone}</p>
`;

container.appendChild(div);

});

}

chargerProduits();

</script>

</body>
</html>
