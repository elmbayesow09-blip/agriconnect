<!DOCTYPE html>
<html>
<head>

<title>Produits</title> 

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

nav{
background:green;
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

#produits-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:8px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="produits.html">Produits</a>
<a href="agriculteurs.html">Agriculteurs</a>
<a href="contact.html">Contact</a>
</nav>

<h1>Nos Produits 🌽</h1>

<input type="text" id="search" placeholder="Rechercher un produit">

<div id="produits-container"></div>

<script>

fetch('produits.json')

.then(res=>res.json())

.then(data=>{

const container=document.getElementById('produits-container')

const search=document.getElementById('search')

function afficherProduits(liste){

container.innerHTML=""

liste.forEach(p=>{

const card=document.createElement('div')

card.className="card"

card.innerHTML=`

<img src="images/${p.image}">

<h3>${p.nom}</h3>

<p>${p.description}</p>

<p><b>${p.prix}</b></p>

<a href="https://wa.me/221770000000">

<button>Acheter</button>

</a>

`

container.appendChild(card)

})

}

afficherProduits(data)

search.addEventListener("input",()=>{

const mot=search.value.toLowerCase()

const filtre=data.filter(p=>p.nom.toLowerCase().includes(mot))

afficherProduits(filtre)

})

})

</script>

</body>
</html>
