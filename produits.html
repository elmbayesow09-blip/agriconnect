<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produits - Agriconnect</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOuonPR7eesU7uRdvUBeF6UDci6ZD_2AQ",
    authDomain: "agriconnect-933f0.firebaseapp.com",
    projectId: "agriconnect-933f0",
    storageBucket: "agriconnect-933f0.appspot.com",
    messagingSenderId: "1028061092951",
    appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.addEventListener('DOMContentLoaded', async () => {
    const produitsDiv = document.getElementById('produits');
    const querySnapshot = await getDocs(collection(db, "produits"));
    querySnapshot.forEach((doc) => {
      const produit = doc.data();
      const card = document.createElement('div');
      card.classList.add('produit');
      card.innerHTML = `<img src="images/${produit.image}" alt="${produit.nom}"><h3>${produit.nom}</h3><p>${produit.description}</p>`;
      produitsDiv.appendChild(card);
    });
  });
</script>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:20px;}
header{background:green; color:white; text-align:center; padding:20px;}
.produit{background:white; padding:15px; margin:10px; border-radius:10px; display:inline-block; vertical-align:top; width:250px; box-shadow:0 0 5px rgba(0,0,0,0.2);}
.produit img{width:100%; border-radius:10px;}
h1{text-align:center;}
</style>
</head>
<body>

<header><h1>Produits disponibles</h1></header>
<div id="produits"></div>

<!-- Bouton flottant Entreprises agricoles -->
<a href="entreprises.html" id="btnEntreprises">Entreprises agricoles</a>
<style>
#btnEntreprises {position:fixed; bottom:90px; right:20px; background:#4CAF50; color:white; padding:15px 20px; border-radius:50px; text-decoration:none; font-weight:bold; box-shadow:0 0 10px rgba(0,0,0,0.3); transition:0.3s; z-index:1000; font-size:16px;}
#btnEntreprises:hover{background:#388E3C;}
@media (max-width:600px){#btnEntreprises{bottom:70px; padding:12px 16px; font-size:14px;}}
</style>

</body>
</html>
