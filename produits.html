<!DOCTYPE html>
<html>
<head>
<title>Produits - Agriconnect</title>
<style>
body { font-family: Arial; background:#f4f4f4; margin:0; text-align:center; }
h1,h2 { color:green; margin-top:20px; }
input { padding:10px; width:250px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; }
#produits-container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px; }
.card { background:white; padding:15px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:220px; transition: transform 0.2s; }
.card img { width:200px; border-radius:10px; }
.card:hover { transform: translateY(-5px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
button { background:green; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; transition: 0.3s; }
button:hover { background:darkgreen; }
</style>
</head>
<body>

<!-- Menu fixe -->
<nav style="position:fixed; top:0; width:100%; background:green; padding:15px; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.2);">
  <a href="index.html" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">Accueil</a>
  <a href="produits.html" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">Produits</a>
  <a href="agriculteurs.html" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">Agriculteurs</a>
  <a href="contact.html" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">Contact</a>
</nav>
<div style="padding-top:70px;"></div>

<h1>Nos Produits Agricoles 🌱</h1>
<input type="text" id="search" placeholder="Rechercher un produit...">

<h2>Ajouter un produit</h2>
<input type="text" id="nom" placeholder="Nom du produit"><br>
<input type="text" id="description" placeholder="Description"><br>
<input type="text" id="prix" placeholder="Prix"><br>
<input type="text" id="image" placeholder="Nom de l'image (ex: tomate.jpg)"><br><br>
<button onclick="ajouterProduit()">Ajouter</button>
<hr>

<div id="produits-container"></div>

<script>
fetch('produits.json')
.then(res=>res.json())
.then(data=>{
const container=document.getElementById('produits-container');
const search=document.getElementById('search');

function afficherProduits(liste){
    container.innerHTML="";
    liste.forEach(p=>{
        const card=document.createElement('div');
        card.className="card";
        card.innerHTML=`<img src="images/${p.image}" alt="${p.nom}">
        <h3>${p.nom}</h3>
        <p>${p.description}</p>
        <p><b>${p.prix}</b></p>`;
        container.appendChild(card);
    });
}
afficherProduits(data);

search.addEventListener("input", ()=>{
    const mot=search.value.toLowerCase();
    afficherProduits(data.filter(p=>p.nom.toLowerCase().includes(mot)));
});

window.ajouterProduit=function(){
    const nom=document.getElementById("nom").value;
    const description=document.getElementById("description").value;
    const prix=document.getElementById("prix").value;
    const image=document.getElementById("image").value;
    const card=document.createElement('div');
    card.className="card";
    card.innerHTML=`<img src="images/${image}" alt="${nom}">
    <h3>${nom}</h3>
    <p>${description}</p>
    <p><b>${prix}</b></p>`;
    container.appendChild(card);
    document.getElementById("nom").value="";
    document.getElementById("description").value="";
    document.getElementById("prix").value="";
    document.getElementById("image").value="";
}
});
</script>

</body>
</html>
