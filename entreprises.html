<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Entreprises</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
}

img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Entreprises agricoles</h1>

<div id="liste"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

db.collection("entreprises").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
let e = doc.data();

html += `
<div class="card">

<img src="${e.image}">

<h3>${e.nom}</h3>

<p><b>Région :</b> ${e.region}</p>

<p>${e.description}</p>

<button onclick="voir('${doc.id}')">
Voir produits
</button>

<button onclick="contacter('${e.nom}')">
Contacter
</button>

</div>
`;
});

document.getElementById("liste").innerHTML = html;

});

function voir(id){
window.location.href = "entreprise-detail.html?id=" + id;
}

function contacter(nom){
alert("Contactez " + nom + " via le chat");
}

</script>

</body>
</html>
