<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Entreprises</title>

<style>

body{font-family:Arial;margin:0;background:#f4f4f4;}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

/* HERO */
.hero{
background:#1b5e20;
color:white;
padding:50px;
text-align:center;
}

.hero button{
background:#ff9800;
padding:15px;
border:none;
color:white;
cursor:pointer;
}

/* STATS */
.stats{
display:flex;
justify-content:space-around;
background:#2e7d32;
color:white;
padding:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* LOGO */
.logo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

/* PRODUITS */
.produits img{
width:60px;
height:60px;
margin:5px;
border-radius:5px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<header>
Entreprises Agricoles
</header>

<!-- HERO -->
<div class="hero">

<h2>Rejoignez Agriconnect et développez votre activité</h2>

<p>Accédez à des milliers de clients et augmentez vos ventes</p>

<button onclick="go('inscription.html')">
Créer un compte entreprise
</button>

</div>

<!-- STATS -->
<div class="stats">

<div>
<h2 id="totalEntreprises">0</h2>
<p>Entreprises</p>
</div>

<div>
<h2 id="totalProduits">0</h2>
<p>Produits</p>
</div>

<div>
<h2 id="totalVentes">0</h2>
<p>Ventes</p>
</div>

</div>

<!-- LISTE -->
<div class="grid" id="liste"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

</script>

<script>

let totalEntreprises = 0;
let totalProduits = 0;
let totalVentes = 0;

db.collection("entreprises").onSnapshot(snapshot=>{

let html = "";
totalEntreprises = snapshot.size;

snapshot.forEach(doc=>{

let e = doc.data();

// valeurs par défaut
let note = e.note || 0;
let ventes = e.ventes || 0;
let produits = e.produits || [];

totalVentes += ventes;
totalProduits += produits.length;

html += `
<div class="card">

<img src="${e.logo || 'https://via.placeholder.com/60'}" class="logo">

<h3>${e.nom}</h3>

<p>${e.description}</p>

<p>⭐ ${note} / 5</p>
<p>📊 Ventes : ${ventes}</p>

<div class="produits">
${produits.map(p=>`<img src="${p}">`).join('')}
</div>

<button onclick="voir('${doc.id}')">Voir entreprise</button>

<button onclick="chat('${e.nom}')">Contacter</button>

</div>
`;

});

document.getElementById("liste").innerHTML = html;

// afficher stats
document.getElementById("totalEntreprises").innerText = totalEntreprises;
document.getElementById("totalProduits").innerText = totalProduits;
document.getElementById("totalVentes").innerText = totalVentes;

});

function voir(id){
window.location.href = "entreprise-detail.html?id="+id;
}

function chat(nom){
alert("Chat avec " + nom);
}

function go(page){
window.location.href = page;
}

</script>

</body>
</html>
