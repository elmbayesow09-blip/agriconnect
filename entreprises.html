<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Entreprises - Agriconnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
    --primary: #27ae60;
    --primary-dark: #1e8449;
    --accent: #f39c12;
    --white: #ffffff;
}

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HERO */
.business-hero {
    padding: 100px 5%;
    text-align: center;
    background: linear-gradient(135deg, #1a3022 0%, #27ae60 100%);
    color: white;
}

/* BADGE */
.badge {
    background: rgba(255,255,255,0.1);
    padding:8px 16px;
    border-radius:50px;
    font-size:0.8rem;
    letter-spacing:2px;
}

/* TITRE */
.hero-content h1 {
    font-size:2.8rem;
    margin:20px 0;
}

.hero-content h1 span {
    color: var(--accent);
}

.hero-content p {
    max-width:600px;
    margin:auto;
    margin-bottom:40px;
}

/* BUTTONS */
.cta-group{
display:flex;
justify-content:center;
gap:20px;
}

.btn-main{
background:var(--accent);
padding:15px 30px;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn-main:hover{
background:#e67e22;
}

.btn-secondary{
border:1px solid white;
padding:15px 30px;
color:white;
text-decoration:none;
border-radius:8px;
}

/* STATS */
.stats-container{
display:flex;
justify-content:center;
gap:30px;
margin-top:-50px;
padding:0 5%;
}

.stat-card{
background:white;
padding:25px;
border-radius:15px;
min-width:150px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.number{
font-size:2.5rem;
font-weight:bold;
color:#2d3436;
}

.label{
color:#777;
font-size:0.8rem;
}

/* ENTREPRISES */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
}

.card img{
width:60px;
height:60px;
border-radius:50%;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px;
margin-top:10px;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="business-hero">

<div class="hero-content">

<span class="badge">Solutions Business</span>

<h1>Rejoignez AgriConnect et <br><span>développez votre activité</span></h1>

<p>
Accédez à un réseau de clients et boostez vos ventes avec nos outils modernes.
</p>

<div class="cta-group">
<a href="inscription.html" class="btn-main">Créer un compte entreprise</a>
<a href="#liste" class="btn-secondary">Voir les entreprises</a>
</div>

</div>

</section>

<!-- STATS -->
<section class="stats-container">

<div class="stat-card">
<span class="number" id="entreprises">0</span>
<span class="label">Entreprises</span>
</div>

<div class="stat-card">
<span class="number" id="produits">0</span>
<span class="label">Produits</span>
</div>

<div class="stat-card">
<span class="number" id="ventes">0</span>
<span class="label">Ventes</span>
</div>

</section>

<!-- LISTE ENTREPRISE -->
<div class="grid" id="liste"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>

let totalE = 0;
let totalP = 0;
let totalV = 0;

// CHARGER ENTREPRISES
db.collection("entreprises").onSnapshot(snapshot=>{

totalE = snapshot.size;
totalP = 0;
totalV = 0;

let html = "";

snapshot.forEach(doc=>{

let e = doc.data();

totalV += e.ventes || 0;
totalP += (e.produits || []).length;

html += `
<div class="card">

<img src="${e.logo || 'https://via.placeholder.com/60'}">

<h3>${e.nom}</h3>

<p>${e.description}</p>

<p>⭐ ${e.note || 0}</p>

<button onclick="voir('${doc.id}')">Voir</button>

</div>
`;

});

document.getElementById("liste").innerHTML = html;

// ANIMATION
animate("entreprises", totalE);
animate("produits", totalP);
animate("ventes", totalV);

});

// ANIMATION COMPTEUR
function animate(id, value){

let el = document.getElementById(id);
let start = 0;

let interval = setInterval(()=>{

start += Math.ceil(value / 30);

if(start >= value){
start = value;
clearInterval(interval);
}

el.innerText = start;

}, 30);

}

function voir(id){
window.location.href = "entreprise-detail.html?id="+id;
}

</script>

</body>
</html>
