<!DOCTYPE html>
<html>
<head>

<title>Entreprises agricoles - Agriconnect</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

#map{
height:500px;
margin:20px;
border-radius:10px;
}

footer{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Entreprises agricoles au Sénégal</h1>
<p>Trouvez des entreprises dans votre région</p>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([14.4974, -14.4524], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'Map data © OpenStreetMap'
}).addTo(map);


L.marker([14.7167, -17.4677]).addTo(map)
.bindPopup("<b>ANCAR</b><br>Dakar");


L.marker([14.6833, -17.45]).addTo(map)
.bindPopup("<b>CNCR</b><br>Dakar");


L.marker([14.35, -16.4167]).addTo(map)
.bindPopup("<b>Tropicasem</b><br>Thiès");


L.marker([13.75, -15.8]).addTo(map)
.bindPopup("<b>Corposem</b><br>Kaolack");

</script>

<footer>

</footer>

</body>
</html>
