<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Entreprises agricoles</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
color:#2e7d32;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}
</style>
</head>

<body>

<h1>Entreprises agricoles</h1>

<div id="liste"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

db.collection("entreprises").onSnapshot(snapshot=>{

let html = "";

snapshot.forEach(doc=>{
let e = doc.data();

html += `
<div class="card">
<h3>${e.nom}</h3>
<p>Région : ${e.region}</p>

<button onclick="voir('${doc.id}')">
Voir les produits
</button>
</div>
`;
});

document.getElementById("liste").innerHTML = html;

});

function voir(id){
window.location.href = "entreprise-detail.html?id=" + id;
}

</script>

</body>
</html>
