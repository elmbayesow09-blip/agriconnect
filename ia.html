<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Assistant IA</title></head>
<body style="font-family:Arial;text-align:center;padding:50px;background:#f9f9f9;">
<h2>Assistant IA</h2>
<input id="question" placeholder="Posez votre question" style="padding:10px;width:300px;"><br><br>
<button onclick="poserQuestion()" style="padding:12px 20px;background:#4CAF50;color:white;border:none;border-radius:8px;">Demander à l’IA</button>
<div id="reponse" style="margin-top:20px;font-weight:bold;"></div>
<a href="index.html"><button style="padding:12px 20px;margin-top:20px;background:#4CAF50;color:white;border:none;border-radius:8px;">Retour</button></a>
<script>
function poserQuestion(){
  let q=document.getElementById("question").value;
  document.getElementById("reponse").innerText="Réponse IA générale pour : "+q+" → Bientôt disponible 🚀";
}
</script>
</body>
</html>
