<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter produit - Agriconnect</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOuonPR7eesU7uRdvUBeF6UDci6ZD_2AQ",
    authDomain: "agriconnect-933f0.firebaseapp.com",
    projectId: "agriconnect-933f0",
    storageBucket: "agriconnect-933f0.appspot.com",
    messagingSenderId: "1028061092951",
    appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.addProduct = async function(){
    const nom = document.getElementById('nom').value;
    const description = document.getElementById('description').value;
    const image = document.getElementById('image').value;
    try{
      await addDoc(collection(db,"produits"), {nom,description,image});
      alert("Produit ajouté !");
      document.getElementById('formProduit').reset();
    }catch(e){
      alert("Erreur : "+e.message);
    }
  }
</script>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:20px;}
header{background:green; color:white; text-align:center; padding:20px;}
form{max-width:400px; margin:30px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, textarea{width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
button{width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;}
button:hover{background:#388E3C;}
</style>
</head>
<body>

<header><h1>Ajouter un produit</h1></header>

<form id="formProduit" onsubmit="event.preventDefault(); addProduct();">
<input type="text" id="nom" placeholder="Nom du produit" required>
<input type="text" id="description" placeholder="Description" required>
<input type="text" id="image" placeholder="Nom du fichier image (ex: riz.jpg)" required>
<button type="submit">Ajouter produit</button>
</form>

<!-- Bouton flottant Entreprises agricoles -->
<a href="entreprises.html" id="btnEntreprises">Entreprises agricoles</a>
<style>
#btnEntreprises {position:fixed; bottom:90px; right:20px; background:#4CAF50; color:white; padding:15px 20px; border-radius:50px; text-decoration:none; font-weight:bold; box-shadow:0 0 10px rgba(0,0,0,0.3); transition:0.3s; z-index:1000; font-size:16px;}
#btnEntreprises:hover{background:#388E3C;}
@media (max-width:600px){#btnEntreprises{bottom:70px; padding:12px 16px; font-size:14px;}}
</style>

</body>
</html>
