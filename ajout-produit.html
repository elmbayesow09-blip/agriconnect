<!DOCTYPE html> 
<html lang="fr">  
 
<head>
<meta charset="UTF-8">
<title>Agriconnect - Ajouter un produit</title> 

<style> 

body{
font-family: Arial;
background:#f5f5f5;
padding:30px;
}

h1{
text-align:center;
color:green;
}

form{
background:white;
padding:20px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#0a7a0a;
}

</style>

</head>

<body>

<h1>Ajouter un produit agricole</h1>

<form id="formProduit">

<input type="text" id="nom" placeholder="Nom du produit (ex: Tomate)" required>

<textarea id="description" placeholder="Description du produit"></textarea>

<input type="number" id="prix" placeholder="Prix (FCFA)">

<input type="text" id="telephone" placeholder="Téléphone">

<button type="submit">Ajouter le produit</button>

</form>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOuonPR7eesU7uRdvUBeF6UDci6ZD_2AQ",
  authDomain: "agriconnect-933f0.firebaseapp.com",
  projectId: "agriconnect-933f0",
  storageBucket: "agriconnect-933f0.firebasestorage.app",
  messagingSenderId: "1028061092951",
  appId: "1:1028061092951:web:66afa5dcf60dfeedfad712",
  measurementId: "G-XMG7WWF0VZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("formProduit");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const nom = document.getElementById("nom").value;
const description = document.getElementById("description").value;
const prix = document.getElementById("prix").value;
const telephone = document.getElementById("telephone").value;

try{

await addDoc(collection(db,"produits"),{

nom:nom,
description:description,
prix:prix,
telephone:telephone

});

alert("Produit ajouté avec succès !");

form.reset();

}catch(error){

alert("Erreur : " + error);

}

});

</script>

</body>
</html>
