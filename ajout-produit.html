<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ajouter produit</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h2>➕ Ajouter un produit</h2>

<input id="nom" placeholder="Nom produit"><br><br>
<input id="prix" placeholder="Prix"><br><br>
<input id="vendeur" placeholder="Votre nom"><br><br>
<input id="region" placeholder="Région"><br><br>

<button onclick="ajouter()">Ajouter</button>

<script src="firebase.js"></script>

<script>
function ajouter(){
const nom = document.getElementById("nom").value;
const prix = parseInt(document.getElementById("prix").value);
const vendeur = document.getElementById("vendeur").value;
const region = document.getElementById("region").value;

db.collection("produits").add({
    nom,
    prix,
    vendeur,
    region
})
.then(()=> alert("✅ Produit ajouté"));
}
</script>

</body>
</html>
