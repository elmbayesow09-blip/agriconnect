<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body style="font-family:Arial">

<h1>👑 Dashboard Admin</h1>

<h2>📦 Produits</h2>
<div id="produits"></div>

<h2>🛒 Commandes</h2>
<div id="commandes"></div>

<script src="firebase.js"></script>

<script>
// PRODUITS
db.collection("produits").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
let p = doc.data();

html += `
<p>
${p.nom} - ${p.prix} FCFA
<button onclick="supprimer('${doc.id}')">❌ Supprimer</button>
</p>
`;
});

document.getElementById("produits").innerHTML = html;
});

// SUPPRIMER
function supprimer(id){
db.collection("produits").doc(id).delete()
.then(()=> alert("Supprimé"));
}

// COMMANDES
db.collection("commandes").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
let c = doc.data();

html += `
<p>${c.produit} - ${c.prix} FCFA (${c.user})</p>
`;
});

document.getElementById("commandes").innerHTML = html;
});
</script>

</body>
</html>
