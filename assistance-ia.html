<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistant IA</title>
<style>
body { font-family: Arial; text-align:center; padding:50px; }
input { padding:10px; width:300px; }
button { padding:10px; background:green; color:white; }
</style>
</head>
<body>

<h2>Assistant IA</h2>

<input id="q" placeholder="Pose ta question">
<br><br>

<button onclick="ia()">Demander</button>

<p id="rep"></p>

<a href="index.html">Retour</a>

<script>
function ia(){
    let q = document.getElementById("q").value;
    document.getElementById("rep").innerText = "Réponse IA pour : " + q;
}
</script>

</body>
</html>
