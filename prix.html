<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<title>Prix agricoles</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:10px;}
button{margin-top:5px;background:#2e7d32;color:white;border:none;padding:5px;}
</style>
</head>

<body>

<h1>📈 Marché agricole (modification possible)</h1>

<div id="liste"></div>

<script src="firebase.js"></script>

<script>
const liste = document.getElementById("liste");

// ⚠️ SIMULATION utilisateur connecté
let utilisateur = localStorage.getItem("user") || "Mamadou";

db.collection("produits").onSnapshot(snapshot => {
    liste.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        let html = `
        <div class="card">
        🌾 <b>${p.nom}</b><br>
        💰 ${p.prix} FCFA<br>
        👨‍🌾 ${p.vendeur}
        `;

        // 🔥 SI c’est le propriétaire → bouton modifier
        if(p.vendeur === utilisateur){
            html += `
            <br><input id="prix-${doc.id}" placeholder="Nouveau prix">
            <button onclick="modifier('${doc.id}')">Modifier</button>
            `;
        }

        html += `</div>`;

        liste.innerHTML += html;
    });
});

// 🔥 fonction modifier
function modifier(id){
    let nouveau = document.getElementById("prix-"+id).value;

    db.collection("produits").doc(id).update({
        prix: parseInt(nouveau)
    })
    .then(()=> alert("✅ Prix modifié"));
}
</script>

</body>
</html>
