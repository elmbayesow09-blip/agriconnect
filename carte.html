<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Carte Agricole - Agriconnect</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:600px;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h2>Carte des Agriculteurs du Sénégal 🌾</h2>

</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4",

authDomain: "agriconnect-933f0.firebaseapp.com",

projectId: "agriconnect-933f0",

storageBucket: "agriconnect-933f0.appspot.com",

messagingSenderId: "1028061092951",

appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

var map = L.map('map').setView([14.4974,-14.4524],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function chargerAgriculteurs(){

const querySnapshot = await getDocs(collection(db,"agriculteurs"));

querySnapshot.forEach((doc)=>{

let data=doc.data();

L.marker([data.latitude,data.longitude])

.addTo(map)

.bindPopup(data.nom+" - "+data.region);

});

}

chargerAgriculteurs();

</script>

</body>

</html>
