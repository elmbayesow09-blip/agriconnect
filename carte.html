<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Carte Agricole - Agriconnect</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

#map{
height:600px;
}

</style>

</head>

<body>

<header>

<h2>Carte des Agriculteurs du Sénégal 🌾</h2>

</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([14.4974,-14.4524],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{

attribution:'© OpenStreetMap'

}).addTo(map);


// Exemple d'agriculteurs

L.marker([14.7167,-17.4677]).addTo(map)
.bindPopup("Agriculteur à Dakar");

L.marker([13.7500,-15.8000]).addTo(map)
.bindPopup("Agriculteur à Kaffrine");

L.marker([14.6937,-16.4493]).addTo(map)
.bindPopup("Agriculteur à Kaolack");

L.marker([12.5681,-16.2730]).addTo(map)
.bindPopup("Agriculteur à Ziguinchor");

</script>

</body>

</html>
