<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
</style>
</head>

<body>

<h1>Notifications</h1>

<div id="notif"></div>

<script>
db.collection("notifications")
.orderBy("date","desc")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
let n = doc.data();
html += "<p>"+n.message+"</p>";
});

document.getElementById("notif").innerHTML = html;

});
</script>

</body>
</html>
