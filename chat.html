<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Messagerie - AgriConnect</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

/* CONTAINER */
.messenger-app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 300px;
    background: #f8f9fa;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 20px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
}

.user {
    display: flex;
    align-items: center;
    padding: 15px;
    cursor: pointer;
    position: relative;
}

.user:hover {
    background: #eee;
}

.avatar {
    width: 40px;
    height: 40px;
    background: #27ae60;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    position: relative;
}

/* STATUT EN LIGNE */
.avatar::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    background: #2ecc71;
    border: 2px solid white;
    border-radius: 50%;
}

/* CHAT AREA */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.chat-header {
    padding: 20px;
    border-bottom: 1px solid #ddd;
    background: white;
}

/* MESSAGES */
.message-feed {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    margin-bottom: 15px;
    padding: 12px 18px;
    border-radius: 15px;
    max-width: 70%;
    animation: popIn 0.3s ease-out;
}

.received {
    background: #eaeaea;
    align-self: flex-start;
}

.sent {
    background: #27ae60;
    color: white;
    align-self: flex-end;
}

/* INPUT */
.message-input {
    display: flex;
    padding: 15px;
    border-top: 1px solid #ddd;
    background: white;
}

.message-input input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
}

.message-input button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    background: #27ae60;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

</style>
</head>

<body>

<div class="messenger-app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">Discussions</div>

        <div class="user">
            <div class="avatar">MD</div>
            <div>
                <b>Modou Diop</b><br>
                <small>En ligne</small>
            </div>
        </div>

    </div>

    <!-- CHAT -->
    <div class="chat-area">

        <div class="chat-header">
            <h3>Modou Diop</h3>
        </div>

        <div class="message-feed" id="feed">
            <div class="msg received">Bonjour, le prix est-il négociable ?</div>
        </div>

        <div class="message-input">
            <input type="text" id="msgInput" placeholder="Écrire un message...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>

    </div>

</div>

<script>

/* SON NOTIFICATION */
const notificationSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3");

/* ENVOYER MESSAGE */
function sendMessage() {
    const input = document.getElementById("msgInput");
    const feed = document.getElementById("feed");

    if (input.value.trim() !== "") {

        const msg = document.createElement("div");
        msg.className = "msg sent";
        msg.textContent = input.value;

        feed.appendChild(msg);

        feed.scrollTop = feed.scrollHeight;

        input.value = "";

        /* SIMULATION REPONSE */
        setTimeout(() => {
            receiveMessage("Merci pour votre message. Réponse en cours...");
        }, 1500);
    }
}

/* RECEVOIR MESSAGE */
function receiveMessage(text) {
    const feed = document.getElementById("feed");

    const msg = document.createElement("div");
    msg.className = "msg received";
    msg.textContent = text;

    feed.appendChild(msg);

    /* SON */
    notificationSound.play();

    /* SCROLL */
    feed.scrollTop = feed.scrollHeight;

    /* NOTIFICATION ONGLET */
    const oldTitle = document.title;
    document.title = "Nouveau message";

    setTimeout(() => {
        document.title = oldTitle;
    }, 3000);
}

</script>

</body>
</html>
