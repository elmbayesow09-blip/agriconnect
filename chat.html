<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Agriculteurs - Agriconnect</title>
<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;}
header{background:#2e7d32;color:white;padding:20px;}
#chatBox{background:white;width:400px;margin:auto;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input{width:70%;padding:10px;}
button{padding:10px;background:#2e7d32;color:white;border:none;cursor:pointer;}
.message{margin:10px;text-align:left;}
</style>
</head>
<body>
<header>
<h2>Chat Agriculteurs / Acheteurs 🌾💬</h2>
</header>

<div id="chatBox">
<div id="messages"></div>
<input id="message" placeholder="Votre message">
<button onclick="envoyer()">Envoyer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4",
authDomain: "agriconnect-933f0.firebaseapp.com",
projectId: "agriconnect-933f0",
storageBucket: "agriconnect-933f0.appspot.com",
messagingSenderId: "1028061092951",
appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messagesDiv = document.getElementById("messages");
const q = query(collection(db,"messages"), orderBy("date","asc"));

onSnapshot(q, (snapshot)=>{
messagesDiv.innerHTML="";
snapshot.forEach(doc=>{
let m = doc.data();
messagesDiv.innerHTML+=`<div class='message'><b>${m.nom || "Anonyme"}:</b> ${m.texte}</div>`;
});
});

window.envoyer = async function(){
let texte = document.getElementById("message").value;
if(texte=="") return;
await addDoc(collection(db,"messages"),{
texte:texte,
nom:"Agriculteur",
date:serverTimestamp()
});
document.getElementById("message").value="";
}
</script>
</body>
</html>
