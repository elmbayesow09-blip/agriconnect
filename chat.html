<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Agriconnect</title>
</head>

<body style="font-family:Arial;">

<h1>🤝 Discussion</h1>

<input id="msg" placeholder="Écrire message">
<button onclick="envoyer()">Envoyer</button>

<ul id="messages"></ul>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { auth } from "./firebase.js";

// envoyer message
window.envoyer = async function(){

    let user = auth.currentUser;

    if(!user){
        alert("Connecte-toi !");
        return;
    }

    let msg = document.getElementById("msg").value;

    await addDoc(collection(db, "messages"), {
        text: msg,
        email: user.email,
        date: new Date()
    });
}

// lire messages en temps réel
let liste = document.getElementById("messages");

onSnapshot(collection(db, "messages"), (snapshot)=>{

    liste.innerHTML = "";

    snapshot.forEach(doc=>{
        let d = doc.data();

        let li = document.createElement("li");
        li.innerText = d.email + " : " + d.text;
        liste.appendChild(li);
    });
});
</script>

</body>
</html>
