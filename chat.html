<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Messagerie - AgriConnect</title>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

/* CONTAINER */
.messenger-app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 300px;
    background: #f8f9fa;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 20px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
}

.user {
    display: flex;
    align-items: center;
    padding: 15px;
    cursor: pointer;
}

.user:hover {
    background: #eee;
}

.avatar {
    width: 40px;
    height: 40px;
    background: #27ae60;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    position: relative;
}

/* ONLINE */
.avatar::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    background: #2ecc71;
    border: 2px solid white;
    border-radius: 50%;
}

/* CHAT AREA */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.chat-header {
    padding: 20px;
    border-bottom: 1px solid #ddd;
    background: white;
}

/* MESSAGES */
.message-feed {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    margin-bottom: 15px;
    padding: 12px 18px;
    border-radius: 15px;
    max-width: 70%;
}

.received {
    background: #eaeaea;
    align-self: flex-start;
}

.sent {
    background: #27ae60;
    color: white;
    align-self: flex-end;
}

/* INPUT */
.message-input {
    display: flex;
    padding: 15px;
    border-top: 1px solid #ddd;
    background: white;
}

.message-input input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
}

.message-input button {
    margin-left: 10px;
    padding: 12px 20px;
    border: none;
    background: #27ae60;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* ===== PROFIL AGRICULTEUR ===== */
.farmer-profile {
    background: #f4f7f6;
    padding: 20px;
    overflow-y: auto;
    height: 100%;
}

/* HERO */
.hero {
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.avatar-large {
    width: 80px;
    height: 80px;
    background: #27ae60;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-right: 15px;
}

.profile-info {
    display: flex;
    align-items: center;
}

.badge {
    background: #27ae60;
    color: white;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
}

/* STATS */
.stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.stat {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.stat h2 {
    margin: 5px 0;
    color: #27ae60;
}

/* SWITCH BUTTON */
.switch-btn {
    margin-top: 10px;
    padding: 10px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
    width: 90%;
    margin-left: 5%;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="messenger-app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">Discussions</div>

        <div class="user">
            <div class="avatar">MD</div>
            <div>
                <b>Modou Diop</b><br>
                <small>En ligne</small>
            </div>
        </div>

        <button class="switch-btn" onclick="showProfile()">Voir Profil</button>
        <button class="switch-btn" onclick="showChat()">Voir Chat</button>

    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chat">

        <div class="chat-header">
            <h3>Modou Diop</h3>
        </div>

        <div class="message-feed" id="feed">
            <div class="msg received">Bonjour, le prix est-il négociable ?</div>
        </div>

        <div class="message-input">
            <input type="text" id="msgInput" placeholder="Message...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>

    </div>

    <!-- PROFIL -->
    <div class="chat-area" id="profile" style="display:none;">

        <div class="farmer-profile">

            <div class="hero">
                <div class="profile-info">
                    <div class="avatar-large">MD</div>
                    <div>
                        <h2>Modou Diop <span class="badge">Vérifié</span></h2>
                        <p>Dakar</p>
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <p>Produits vendus</p>
                    <h2>1240 kg</h2>
                </div>

                <div class="stat">
                    <p>Note</p>
                    <h2>4.9 /5</h2>
                </div>

                <div class="stat">
                    <p>Réponse</p>
                    <h2>98%</h2>
                </div>

                <div class="stat">
                    <p>Commandes</p>
                    <h2>156</h2>
                </div>
            </div>

            <canvas id="chart"></canvas>

        </div>

    </div>

</div>

<script>

/* SWITCH */
function showProfile() {
    document.getElementById("chat").style.display = "none";
    document.getElementById("profile").style.display = "flex";
}

function showChat() {
    document.getElementById("chat").style.display = "flex";
    document.getElementById("profile").style.display = "none";
}

/* MESSAGE */
function sendMessage() {
    const input = document.getElementById("msgInput");
    const feed = document.getElementById("feed");

    if(input.value !== "") {
        const msg = document.createElement("div");
        msg.className = "msg sent";
        msg.textContent = input.value;
        feed.appendChild(msg);
        input.value = "";
    }
}

/* GRAPH */
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai'],
        datasets: [{
            data: [400, 600, 800, 700, 1200],
            backgroundColor: '#27ae60'
        }]
    }
});

</script>

</body>
</html>
