<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connexion Agriconnect</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f0f0; text-align:center; padding:50px;}
input { padding:10px; margin:10px; width:250px; border-radius:5px; border:1px solid #ccc;}
button { padding:12px 20px; margin:10px; border:none; border-radius:8px; background:#4CAF50; color:white; cursor:pointer;}
button:hover { background:#388E3C; }
</style>
</head>
<body>
<h2>Connexion / Inscription</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>

<button onclick="login()">Se connecter</button>
<button onclick="register()">Créer un compte</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import firebaseConfig from "./config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  signInWithEmailAndPassword(auth,email,password)
  .then(()=>{ alert("Connecté !"); window.location.href="index.html"; })
  .catch(e=>alert(e.message));
}

window.register = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  createUserWithEmailAndPassword(auth,email,password)
  .then(()=>alert("Compte créé !"))
  .catch(e=>alert(e.message));
}
</script>
</body>
</html>
