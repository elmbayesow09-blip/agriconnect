<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion | AgriConnect</title>

<style>

:root {
    --green:#27ae60;
    --dark:#1e293b;
    --error:#e74c3c;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:100%;
max-width:400px;
}

h2{text-align:center;}

.input{
margin-bottom:20px;
}

.input label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.input input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
}

.input input:focus{
border-color:var(--green);
outline:none;
}

.password-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

button{
width:100%;
padding:15px;
background:var(--green);
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#219150;
}

.error{
color:var(--error);
display:none;
margin-bottom:10px;
}

.loader{
display:none;
margin:auto;
border:3px solid #ccc;
border-top:3px solid green;
border-radius:50%;
width:20px;
height:20px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="card">

<h2>Connexion</h2>

<form id="loginForm">

<div class="input">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input">
<label>Mot de passe</label>
<div class="password-box">
<input type="password" id="password" required>
<span class="eye" id="eye">👁</span>
</div>
</div>

<div class="error" id="error"></div>

<button type="submit" id="btn">
Se connecter
<div class="loader" id="loader"></div>
</button>

</form>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

</script>

<script src="login.js"></script>

</body>
</html>
