<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Agriconnect</title>
<script type="module"> 
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4 
  authDomain: "agriconnect-933f0.firebaseapp.com",
  projectId: "agriconnect-933f0",
  storageBucket: "agriconnect-933f0.appspot.com",
  messagingSenderId: "1028061092951",
  appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Connexion réussie !");
            window.location.href = "ajout-produit.html";
        } catch (error) {
            alert("Erreur : " + error.message);
        }
    });
});
</script>
<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{background:green;color:white;text-align:center;padding:20px;}
main{padding:20px;max-width:400px;margin:30px auto;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:10px;background:#4CAF50;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
button:hover{background:#388E3C;}
#btnEntreprises{position:fixed;bottom:20px;left:20px;background:#4CAF50;color:white;padding:15px 20px;border-radius:50px;text-decoration:none;font-weight:bold;box-shadow:0 0 10px rgba(0,0,0,0.3);z-index:1000;transition:0.3s;}
#btnEntreprises:hover{background:#388E3C;}
#contactBox{position:fixed;bottom:20px;right:20px;width:220px;padding:15px;background:#f0fff0;border:2px solid #4CAF50;border-radius:10px;box-shadow:0 0 12px rgba(0,0,0,0.2);text-align:center;font-size:14px;z-index:1000;}
#contactBox h4{margin:0 0 5px 0;color:#4CAF50;}
#contactBox p{margin:5px 0;}
#contactBox a{color:#4CAF50;font-weight:bold;text-decoration:none;}
#contactBox a:hover{text-decoration:underline;}
footer{background:#f0f0f0;text-align:center;padding:15px;color:#555;font-size:13px;margin-top:40px;}
</style>
</head>

<main>
<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
