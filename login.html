<!DOCTYPE html> 
<html>  
<head>
<meta charset="UTF-8">
<title>Connexion Agriconnect</title>
</head> 

<body>

<h2>Connexion Agriconnect</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Se connecter</button>
<button onclick="register()">Créer un compte</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "TA_NOUVELLE_CLE_API",
authDomain: "agriconnect-933f0.firebaseapp.com",
projectId: "agriconnect-933f0",
appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => {
alert("Connexion réussie !");
window.location.href = "index.html";
})
.catch(e => alert(e.message));
}

window.register = function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)
.then(() => alert("Compte créé !"))
.catch(e => alert(e.message));
}

</script>

</body>
</html>
