<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Achat produits</title>
</head>

<body style="font-family:Arial;text-align:center;padding:20px;">

<h1>🛒 Marché Agricole</h1>

<div>
    <h3>🌾 Riz - 5000 FCFA</h3>
    <button onclick="acheter('Riz',5000)">Acheter</button>
</div>

<div>
    <h3>🌽 Maïs - 3000 FCFA</h3>
    <button onclick="acheter('Maïs',3000)">Acheter</button>
</div>

<div>
    <h3>🥜 Arachide - 4000 FCFA</h3>
    <button onclick="acheter('Arachide',4000)">Acheter</button>
</div>

<script type="module">
import { passerCommande } from "./commande.js";

window.acheter = async function(produit, prix){

    let email = prompt("Entrez votre email");

    if(!email){
        alert("Email requis");
        return;
    }

    await passerCommande(produit, prix, email);
}
</script>

</body>
</html>
