<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Acheter</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>🛒 Acheter produits</h1>

<div id="produits"></div>

<script src="firebase.js"></script>

<script>
const container = document.getElementById("produits");

db.collection("produits").onSnapshot(snapshot => {
container.innerHTML="";

snapshot.forEach(doc=>{
let p = doc.data();

container.innerHTML += `
<p>${p.nom} - ${p.prix} FCFA</p>
<button onclick="payer('${p.nom}', ${p.prix})">💳 Payer</button>
function payer(nom, prix){
let numero = prompt("Entrez numéro Wave / Orange Money");

if(!numero){
alert("Numéro requis");
return;
}

db.collection("paiements").add({
produit: nom,
prix: prix,
numero: numero,
date: new Date()
})
.then(()=> alert("✅ Paiement simulé réussi"));
}
</script>

</body>
</html>
