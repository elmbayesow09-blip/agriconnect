<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commander produit</title>
<style>
body { font-family: Arial; text-align:center; padding:50px; background:#f9f9f9;}
input { padding:10px; margin:10px; width:250px; border-radius:5px; border:1px solid #ccc;}
button { padding:12px 20px; margin:10px; border:none; border-radius:8px; background:#4CAF50; color:white; cursor:pointer;}
button:hover { background:#388E3C; }
</style>
</head>
<body>
<h2>Commander un produit</h2>

<input id="nom" placeholder="Votre nom"><br>
<input id="telephone" placeholder="Téléphone"><br>
<input id="produit" placeholder="Nom du produit"><br>
<input id="prix" placeholder="Prix"><br>

<button onclick="commander()">Commander</button>
<button onclick="payer()">Payer avec Wave / Orange Money</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import firebaseConfig from "./config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.commander = async function(){
  let nom=document.getElementById("nom").value;
  let telephone=document.getElementById("telephone").value;
  let produit=document.getElementById("produit").value;
  let prix=document.getElementById("prix").value;
  await addDoc(collection(db,"commandes"),{nom,telephone,produit,prix,date:new Date()});
  alert("Commande envoyée !");
}

window.payer = function(){
  alert("Paiement en cours...");
  setTimeout(()=>{ alert("Paiement réussi ! 🎉"); },2000);
}
</script>
</body>
</html>
