<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Acheter</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>🛒 Acheter produits</h1>

<div id="produits"></div>

<script src="firebase.js"></script>

<script>
const container = document.getElementById("produits");

db.collection("produits").onSnapshot(snapshot => {
    container.innerHTML = "";

    snapshot.forEach(doc => {
        const p = doc.data();

        const div = document.createElement("div");

        div.innerHTML = `
        <p>
        ${p.nom} - ${p.prix} FCFA<br>
        👨‍🌾 ${p.vendeur}
        </p>
        <button onclick="acheter('${p.nom}', ${p.prix})">Acheter</button>
        <hr>
        `;

        container.appendChild(div);
    });
});

function acheter(nom, prix){
    alert("✅ Achat de " + nom);
}
</script>

</body>
</html>
