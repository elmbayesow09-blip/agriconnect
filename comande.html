<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Acheter un produit</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
button{background:#2e7d32;color:white;border:none;padding:10px;border-radius:5px;cursor:pointer;}
button:hover{background:#1b5e20;}
</style>
</head>

<body>

<h1>Achat de produits agricoles</h1>

<div id="produits"></div>

<script src="firebase.js"></script>

<script>
const container = document.getElementById("produits");

db.collection("produits").onSnapshot(snapshot=>{
    container.innerHTML = "";

    snapshot.forEach(doc=>{
        let p = doc.data();

        container.innerHTML += `
        <div class="card">
        <h3>${p.nom}</h3>
        <p>Prix : ${p.prix} FCFA</p>
        <p>Vendeur : ${p.vendeur}</p>
        <button onclick="acheter('${p.nom}', ${p.prix})">Acheter</button>
        </div>
        `;
    });
});

function acheter(nom, prix){
    let user = firebase.auth().currentUser;

    if(!user){
        alert("Veuillez vous connecter");
        return;
    }

    db.collection("commandes").add({
        produit: nom,
        prix: prix,
        user: user.email,
        date: new Date()
    });

    db.collection("notifications").add({
        message: "Nouvelle commande : " + nom,
        date: new Date()
    });

    alert("Commande effectuée avec succès");
}
</script>

</body>
</html>
