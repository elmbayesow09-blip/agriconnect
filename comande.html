<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Acheter</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>🛒 Acheter produits</h1>

<div id="produits"></div>

<script src="firebase.js"></script>

<script>
const container = document.getElementById("produits");

db.collection("produits").onSnapshot(snapshot => {
container.innerHTML="";

snapshot.forEach(doc=>{
let p = doc.data();

container.innerHTML += `
<p>${p.nom} - ${p.prix} FCFA</p>
<button onclick="payer('${p.nom}', ${p.prix})">💳 Payer</button>
function acheter(nom, prix){
let user = firebase.auth().currentUser;

if(!user){
alert("Connecte-toi !");
return;
}

// ✅ Enregistrer commande
db.collection("commandes").add({
produit: nom,
prix: prix,
user: user.email,
date: new Date()
});

// 🔔 Notification
db.collection("notifications").add({
message: "Nouvelle commande de " + nom,
date: new Date()
});

alert("✅ Commande + notification envoyée");
}
</script>

</body>
</html>
