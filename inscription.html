<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription Agriconnect</title>
</head>

<body style="font-family:Arial;text-align:center;padding:20px;">

<h1>📝 Inscription</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="register()">S'inscrire</button>

<p id="msg"></p>

<script type="module">
import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.register = async function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try{
        await createUserWithEmailAndPassword(auth, email, password);
        document.getElementById("msg").innerHTML = "✅ Compte créé avec succès";
    }catch(e){
        document.getElementById("msg").innerHTML = "❌ Erreur : " + e.message;
    }
}
</script>

</body>
</html>
