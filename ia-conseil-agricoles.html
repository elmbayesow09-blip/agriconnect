<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IA Conseils Agricoles</title>
<style>
body { font-family: Arial; text-align:center; padding:50px; background:#f9f9f9;}
h2 { color:#2e7d32; }
input { padding:10px; width:300px; margin:10px; border-radius:5px; border:1px solid #ccc;}
button { padding:12px 20px; margin-top:10px; border:none; border-radius:8px; background:#4CAF50; color:white; cursor:pointer;}
button:hover { background:#388E3C; }
#reponse { margin-top:20px; font-weight:bold; color:#333; }
</style>
</head>
<body>

<h2>IA Conseils Agricoles</h2>
<input id="question" placeholder="Demandez un conseil agricole"><br>
<button onclick="poserConseil()">Demander conseil</button>
<div id="reponse"></div>

<a href="index.html"><button>Retour à l'accueil</button></a>

<script>
function poserConseil(){
  let q = document.getElementById("question").value;
  document.getElementById("reponse").innerText = "Conseil IA agricole pour : " + q + " → Bientôt disponible 🌱";
}
</script>

</body>
</html>
