<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agriculteurs - AgriConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* GLOBAL */
body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

/* HERO PRO */
.hero-agriculteurs {
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
background-size: cover;
background-position: center;
padding: 80px 20px;
text-align: center;
color: white;
border-radius: 0 0 30px 30px;
}

.hero-agriculteurs h1 {
font-size: 40px;
font-weight: bold;
}

.hero-agriculteurs p {
font-size: 18px;
opacity: 0.9;
}

/* BUTTON PRO */
.btn-agri-pro {
position: relative;
overflow: hidden;
background: #27ae60;
color: white;
padding: 15px 30px;
border-radius: 10px;
border: none;
font-weight: bold;
cursor: pointer;
margin-top:20px;
}

.shimmer {
position: absolute;
top: 0; left: -100%;
width: 50%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
animation: shimmer 3s infinite;
}

@keyframes shimmer {
0% { left: -100%; }
100% { left: 150%; }
}

/* SECTION */
.section{
padding:40px;
text-align:center;
}

/* SELECT PRO */
#regionSelect{
width:300px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD PRO */
.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* BADGE */
.badge{
background:#eafaf1;
color:#27ae60;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
cursor:pointer;
color:#27ae60;
font-weight:bold;
}

/* MAP */
#map{
height:450px;
margin:40px;
border-radius:15px;
}

/* FORM */
.form{
background:white;
padding:30px;
max-width:800px;
margin:40px auto;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
background:#27ae60;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#219150;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero-agriculteurs">
<h1>Agriculteurs</h1>
<p>Trouvez, contactez et localisez les producteurs agricoles</p>

<button class="btn-agri-pro">
Devenir Partenaire Agricole
<div class="shimmer"></div>
</button>

</div>

<!-- FILTRE -->
<div class="section">

<select id="regionSelect">
<option value="all">Toutes les régions</option>
<option value="dakar">Dakar</option>
<option value="thies">Thiès</option>
<option value="kaolack">Kaolack</option>
<option value="saint-louis">Saint-Louis</option>
</select>

<div class="grid" id="liste"></div>

</div>

<!-- CARTE -->
<h2 style="text-align:center;">Carte des agriculteurs</h2>
<div id="map"></div>

<!-- FORM -->
<div class="form">

<h3>Ajouter une exploitation</h3>

<form id="form">

<input type="text" id="nom" placeholder="Nom" required>

<select id="region">
<option>Dakar</option>
<option>Thiès</option>
<option>Kaolack</option>
<option>Saint-Louis</option>
</select>

<input type="text" id="produits" placeholder="Produits (riz, maïs...)">

<input type="number" step="any" id="lat" placeholder="Latitude" required>
<input type="number" step="any" id="lng" placeholder="Longitude" required>

<button type="submit">Ajouter</button>

</form>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([14.5, -14.4], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var icon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/2829/2829844.png',
iconSize:[30,30]
});

let allData = [];

// LOAD FIREBASE
db.collection("agriculteurs").onSnapshot(snapshot=>{

allData = [];

map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer);
});

snapshot.forEach(doc=>{
let a = doc.data();
allData.push(a);

// MAP
if(a.lat && a.lng){
L.marker([a.lat, a.lng], {icon:icon})
.addTo(map)
.bindPopup("<b>"+a.nom+"</b><br>"+a.produits);
}
});

afficher(allData);

});

// DISPLAY
function afficher(data){

let html = "";

data.forEach(a=>{
html += `
<div class="card">
<h3>${a.nom}</h3>
<p><b>Région:</b> ${a.region}</p>
<p><b>Produits:</b> ${a.produits}</p>
<span class="badge">${a.specialite || "Agriculture"}</span>
<div class="btn" onclick="contacter('${a.nom}')">Contacter</div>
</div>
`;
});

document.getElementById("liste").innerHTML = html;

}

// FILTER
document.getElementById("regionSelect").addEventListener("change", function(){

let val = this.value;

if(val === "all"){
afficher(allData);
}else{
let f = allData.filter(a=>a.region.toLowerCase() === val);
afficher(f);
}

});

// ADD DATA
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let data = {
nom: document.getElementById("nom").value,
region: document.getElementById("region").value,
produits: document.getElementById("produits").value,
lat: parseFloat(document.getElementById("lat").value),
lng: parseFloat(document.getElementById("lng").value)
};

db.collection("agriculteurs").add(data);

alert("Ajout réussi");
this.reset();

});

// CONTACT
function contacter(nom){
alert("Contacter " + nom);
}

</script>

</body>
</html>
