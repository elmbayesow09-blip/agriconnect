<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agriculteurs - AgriConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* GLOBAL */
body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

/* HERO */
.hero-agriculteurs {
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
background-size: cover;
background-position: center;
padding: 80px 20px;
text-align: center;
color: white;
}

.hero-agriculteurs h1 {
font-size: 40px;
}

.btn-agri-pro {
background: #27ae60;
color: white;
padding: 15px 30px;
border-radius: 10px;
border: none;
cursor: pointer;
}

/* SEARCH PRO */
.search-container-pro {
position: relative;
max-width: 500px;
margin: 30px auto;
}

.search-box {
display: flex;
align-items: center;
background: white;
padding: 15px 20px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.search-box input {
border: none;
outline: none;
width: 100%;
margin-left: 10px;
}

.region-dropdown {
position: absolute;
top: 110%;
width: 100%;
background: white;
border-radius: 12px;
box-shadow: 0 15px 35px rgba(0,0,0,0.1);
list-style: none;
max-height: 250px;
overflow-y: auto;
display: none;
z-index: 100;
}

.region-dropdown li {
padding: 12px;
cursor: pointer;
}

.region-dropdown li:hover {
background: #f0fdf4;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* MAP */
#map{
height:450px;
margin:40px;
}

/* FORM */
.form{
background:white;
padding:30px;
max-width:800px;
margin:40px auto;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:15px;
background:#27ae60;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero-agriculteurs">
<h1>Agriculteurs</h1>
<p>Trouvez les producteurs partout au Sénégal</p>
<button class="btn-agri-pro">Devenir partenaire</button>
</div>

<!-- SEARCH PRO -->
<div class="search-container-pro">

<div class="search-box">
<span>📍</span>
<input type="text" id="regionInput" placeholder="Rechercher une région" onkeyup="filterRegions()">
</div>

<ul id="regionList" class="region-dropdown">
<li onclick="selectRegion('Dakar')">Dakar</li>
<li onclick="selectRegion('Thiès')">Thiès</li>
<li onclick="selectRegion('Kaolack')">Kaolack</li>
<li onclick="selectRegion('Saint-Louis')">Saint-Louis</li>
</ul>

</div>

<!-- LIST -->
<div class="grid" id="liste"></div>

<!-- MAP -->
<div id="map"></div>

<!-- FORM -->
<div class="form">
<h3>Ajouter un agriculteur</h3>

<form id="form">
<input type="text" id="nom" placeholder="Nom" required>
<input type="text" id="region" placeholder="Région" required>
<input type="text" id="produits" placeholder="Produits">
<input type="number" step="any" id="lat" placeholder="Latitude" required>
<input type="number" step="any" id="lng" placeholder="Longitude" required>

<button type="submit">Ajouter</button>
</form>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- MAP -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([14.5, -14.4], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allData = [];

// FIRESTORE LOAD
db.collection("agriculteurs").onSnapshot(snapshot=>{

allData = [];

map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer);
});

snapshot.forEach(doc=>{
let a = doc.data();
allData.push(a);

if(a.lat && a.lng){
L.marker([a.lat, a.lng]).addTo(map)
.bindPopup(a.nom);
}
});

afficher(allData);

});

// DISPLAY
function afficher(data){
let html = "";

data.forEach(a=>{
html += `
<div class="card">
<h3>${a.nom}</h3>
<p>${a.region}</p>
<p>${a.produits}</p>
</div>
`;
});

document.getElementById("liste").innerHTML = html;
}

// SEARCH SYSTEM
const regionInput = document.getElementById('regionInput');
const regionList = document.getElementById('regionList');

regionInput.addEventListener('click', ()=>{
regionList.style.display = 'block';
});

function filterRegions(){
const filter = regionInput.value.toLowerCase();
const li = regionList.getElementsByTagName('li');

for (let i = 0; i < li.length; i++) {
let text = li[i].textContent.toLowerCase();
li[i].style.display = text.includes(filter) ? "" : "none";
}
}

// SELECT REGION
function selectRegion(name){
regionInput.value = name;
regionList.style.display = 'none';

let filtered = allData.filter(a =>
a.region.toLowerCase() === name.toLowerCase()
);

afficher(filtered);
}

// CLOSE DROPDOWN
document.addEventListener('click', (e)=>{
if (!e.target.closest('.search-container-pro')){
regionList.style.display = 'none';
}
});

// ADD DATA
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let data = {
nom: nom.value,
region: region.value,
produits: produits.value,
lat: parseFloat(lat.value),
lng: parseFloat(lng.value)
};

db.collection("agriculteurs").add(data);
alert("Ajout réussi");
this.reset();
});

</script>

</body>
</html>
