<!DOCTYPE html>
<html>
<head>
<title>Agriculteurs - Agriconnect</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
color:green;
}

#agriculteurs{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:220px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Nos Agriculteurs 🌾</h1>

<div id="agriculteurs"></div>

<script>

fetch('agriculteurs.json')
.then(response => response.json())
.then(data => {

const container = document.getElementById('agriculteurs');

data.forEach(a => {

const card = document.createElement('div');
card.className="card";

card.innerHTML = `
<h3>${a.nom}</h3>
<p>Région : ${a.region}</p>
<p>Produit : ${a.produit}</p>

<a href="https://wa.me/${a.telephone}">
<button>Contacter</button>
</a>
`;

container.appendChild(card);

});

});

</script>

</body>
</html>
