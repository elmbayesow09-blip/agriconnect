<!DOCTYPE html>
<html>
<head>
<title>Agriculteurs - Agriconnect</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;text-align:center;}
header{background:#2e7d32;color:white;padding:20px;text-align:center;}
#map{height:500px;margin:20px;border-radius:10px;}
footer{background:#2e7d32;color:white;text-align:center;padding:20px;margin-top:40px;}
</style>
</head>
<body>

<header>
<h1>Agriculteurs au Sénégal</h1>
<p>Localisation des agriculteurs et de leurs produits</p>
</header>

<div id="map"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Configuration Firebase
const firebaseConfig = {
apiKey: "AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4",
authDomain: "agriconnect-933f0.firebaseapp.com",
projectId: "agriconnect-933f0",
storageBucket: "agriconnect-933f0.appspot.com",
messagingSenderId: "1028061092951",
appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Initialiser la carte
var map = L.map('map').setView([14.4974, -14.4524], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'Map data © OpenStreetMap'
}).addTo(map);

// Charger tous les produits depuis Firebase et ajouter sur la carte
async function chargerAgriculteurs() {
    const querySnapshot = await getDocs(collection(db,"produits"));
    querySnapshot.forEach((doc)=>{
        let p = doc.data();
        if(p.lat && p.lon){ // Vérifie que les coordonnées existent
            L.marker([p.lat, p.lon]).addTo(map)
            .bindPopup(`<b>${p.nom}</b><br>Région: ${p.region || "N/A"}<br>Produit: ${p.produit || "N/A"}<br>Agriculteur: ${p.emailAgriculteur}`);
        }
    });
}

chargerAgriculteurs();
</script>

<footer>
© 2026 Agriconnect | Contact : elmbayesow09@gmail.com
</footer>

</body>
</html>
