<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agriculteurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

/* HEADER */
header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

/* BOUTON AGRI */
.nav-btn-agri {
display: inline-flex;
align-items: center;
gap: 10px;
padding: 10px 24px;
background-color: transparent;
color: #27ae60;
border: 2px solid #27ae60;
border-radius: 50px;
font-weight: 600;
text-decoration: none;
transition: all 0.3s ease;
cursor: pointer;
margin:20px;
}

.nav-btn-agri:hover {
background-color: #27ae60;
color: white;
box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
transform: translateY(-2px);
}

.nav-btn-agri:hover svg {
transform: rotate(15deg);
transition: transform 0.3s ease;
}

/* SECTION */
.section{
padding:40px;
text-align:center;
}

.section h2 span{
color:#27ae60;
}

/* SELECT */
#regionSelect{
width:300px;
padding:15px;
border-radius:10px;
border:2px solid #e0e0e0;
font-size:1rem;
margin-bottom:30px;
}

#regionSelect:focus{
border-color:#27ae60;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.card{
background:white;
padding:25px;
border-radius:20px;
transition:0.3s;
border:1px solid #eee;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.05);
}

/* BADGE */
.badge{
display:inline-block;
background:#eafaf1;
color:#27ae60;
padding:5px 10px;
border-radius:50px;
margin:10px 0;
font-size:0.8rem;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
text-decoration:none;
color:#2d3436;
font-weight:bold;
border-bottom:2px solid #27ae60;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Espace Agriculteurs
</header>

<!-- BOUTON PRO -->
<a href="#" class="nav-btn-agri">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
<path d="m12 22 8-4V6l-8-4-8 4v12z"></path>
<path d="M12 22V14"></path>
</svg>
Espace Agriculteurs
</a>

<!-- SECTION -->
<div class="section">

<h2>Trouvez des agriculteurs par <span>Région</span></h2>

<p>Contactez les producteurs locaux près de chez vous</p>

<select id="regionSelect">
<option value="all">Toutes les régions</option>
<option value="dakar">Dakar</option>
<option value="thies">Thiès</option>
<option value="saint-louis">Saint-Louis</option>
<option value="kaolack">Kaolack</option>
<option value="ziguinchor">Ziguinchor</option>
</select>

<div class="grid" id="liste"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

</script>

<script>

let allData = [];

// Charger agriculteurs
db.collection("agriculteurs").onSnapshot(snapshot=>{

allData = [];

snapshot.forEach(doc=>{
allData.push(doc.data());
});

afficher(allData);

});

// afficher
function afficher(data){

let html = "";

data.forEach(a=>{

html += `
<div class="card">

<h3>${a.nom}</h3>

<p><strong>Région :</strong> ${a.region}</p>

<p><strong>Produits :</strong> ${a.produits}</p>

<span class="badge">${a.specialite || "Agriculture"}</span>

<a class="btn" onclick="contacter('${a.nom}')">
Contacter
</a>

</div>
`;

});

document.getElementById("liste").innerHTML = html;

}

// filtre
document.getElementById("regionSelect").addEventListener("change", function(){

let val = this.value;

if(val === "all"){
afficher(allData);
}else{
let filtered = allData.filter(a=>a.region.toLowerCase() === val);
afficher(filtered);
}

});

function contacter(nom){
alert("Contacter " + nom);
}

</script>

</body>
</html>
