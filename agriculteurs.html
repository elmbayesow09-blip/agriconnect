<!DOCTYPE html>
<html>
<head>

<title>Agriculteurs</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

nav{
background:green;
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

#map{
height:400px;
margin-top:20px;
}

</style>

</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="produits.html">Produits</a>
<a href="agriculteurs.html">Agriculteurs</a>
<a href="contact.html">Contact</a>
</nav>

<h1>Carte des Agriculteurs 🌾</h1>

<div id="map"></div>

<script>

var map=L.map('map').setView([14.4974,-14.4524],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

fetch('agriculteurs.json')

.then(res=>res.json())

.then(data=>{

data.forEach(a=>{

L.marker([a.lat,a.lng])

.addTo(map)

.bindPopup(

"<b>"+a.nom+"</b><br>"+a.region+

"<br><a href='https://wa.me/"+a.telephone+"'>Contacter</a>"

)

})

})

</script>

</body>
</html>
