<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agriculteurs - AgriConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* GLOBAL */
body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

/* HERO */
.hero-agriculteurs {
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
background-size: cover;
background-position: center;
padding: 80px 20px;
text-align: center;
color: white;
}

.hero-agriculteurs h1 {
font-size: 40px;
}

.btn-agri-pro {
background: #27ae60;
color: white;
padding: 15px 30px;
border-radius: 10px;
border: none;
cursor: pointer;
}

/* SEARCH */
.search-container-pro {
position: relative;
max-width: 500px;
margin: 30px auto;
}

.search-box {
display: flex;
align-items: center;
background: white;
padding: 15px 20px;
border-radius: 12px;
}

.search-box input {
border: none;
outline: none;
width: 100%;
margin-left: 10px;
}

.region-dropdown {
position: absolute;
top: 110%;
width: 100%;
background: white;
border-radius: 12px;
display: none;
z-index: 100;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
}

/* MAP */
#map{
height:450px;
margin:40px;
}

/* FORM */
.form{
background:white;
padding:30px;
max-width:800px;
margin:40px auto;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:15px;
background:#27ae60;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ========================= */
/* CHAT PRO */
/* ========================= */

#chat-widget-button {
position: fixed;
bottom: 30px;
right: 30px;
background: #27ae60;
color: white;
padding: 15px 25px;
border-radius: 50px;
cursor: pointer;
z-index: 9999;
}

#chat-window {
position: fixed;
bottom: 100px;
right: 30px;
width: 350px;
height: 450px;
background: white;
border-radius: 15px;
display: flex;
flex-direction: column;
z-index: 9998;

opacity: 0;
transform: translateY(20px) scale(0.95);
pointer-events: none;
transition: all 0.4s ease;
}

#chat-window.active {
opacity: 1;
transform: translateY(0) scale(1);
pointer-events: all;
}

.chat-header {
background: #1a3022;
color: white;
padding: 15px;
display:flex;
justify-content:space-between;
}

.chat-messages {
flex:1;
padding:20px;
overflow-y:auto;
background:#f9f9f9;
}

.chat-input {
padding:15px;
display:flex;
gap:10px;
}

.chat-input input {
flex:1;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero-agriculteurs">
<h1>Agriculteurs</h1>
<p>Trouvez les producteurs partout au Sénégal</p>
<button class="btn-agri-pro">Devenir partenaire</button>
</div>

<!-- SEARCH -->
<div class="search-container-pro">
<div class="search-box">
<input type="text" id="regionInput" placeholder="Rechercher une région">
</div>
</div>

<!-- LIST -->
<div class="grid" id="liste"></div>

<!-- MAP -->
<div id="map"></div>

<!-- FORM -->
<div class="form">
<h3>Ajouter un agriculteur</h3>

<form id="form">
<input type="text" id="nom" placeholder="Nom" required>
<input type="text" id="region" placeholder="Région" required>
<input type="text" id="produits" placeholder="Produits">
<input type="number" step="any" id="lat" placeholder="Latitude" required>
<input type="number" step="any" id="lng" placeholder="Longitude" required>

<button type="submit">Ajouter</button>
</form>
</div>

<!-- ========================= -->
<!-- CHAT UI -->
<!-- ========================= -->

<div id="chat-widget-button" onclick="toggleChat()">
💬 Contacter
</div>

<div id="chat-window">
<div class="chat-header">
<span>Chat Agriculteur</span>
<span onclick="toggleChat()" style="cursor:pointer;">×</span>
</div>

<div class="chat-messages" id="chatMessages">
<div class="bot-msg">Bonjour 👋 comment puis-je vous aider ?</div>
</div>

<div class="chat-input">
<input type="text" id="chatInput" placeholder="Votre message">
<button onclick="sendMessage()">Envoyer</button>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- MAP -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([14.5, -14.4], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

db.collection("agriculteurs").onSnapshot(snapshot=>{

let html = "";

snapshot.forEach(doc=>{
let a = doc.data();

html += `
<div class="card">
<h3>${a.nom}</h3>
<p>${a.region}</p>
<p>${a.produits}</p>
<button onclick="toggleChat()">Contacter</button>
</div>
`;

if(a.lat && a.lng){
L.marker([a.lat, a.lng]).addTo(map)
.bindPopup(a.nom);
}

});

document.getElementById("liste").innerHTML = html;

});

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

db.collection("agriculteurs").add({
nom: nom.value,
region: region.value,
produits: produits.value,
lat: parseFloat(lat.value),
lng: parseFloat(lng.value)
});

alert("Ajout réussi");
this.reset();
});

/* CHAT */
function toggleChat() {
document.getElementById('chat-window').classList.toggle('active');
}

function sendMessage(){
let input = document.getElementById("chatInput");
let msg = input.value;

if(msg === "") return;

let box = document.getElementById("chatMessages");

box.innerHTML += `<div>${msg}</div>`;
input.value = "";
}

</script>

</body>
</html>
