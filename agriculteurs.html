<!DOCTYPE html>
<html>
<head>
<title>Agriculteurs - Agriconnect</title>
<style> 
body { font-family: Arial; background:#f4f4f4; text-align:center; margin:0; }
nav { background:green; padding:15px; }
nav a { color:white; margin-right:20px; text-decoration:none; font-weight:bold; }
h1,h2 { color:green; margin-top:20px; }
input { padding:10px; width:250px; margin-bottom:10px; }
#map { height:400px; margin-top:20px; }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<!-- Menu -->
<nav>
  <a href="index.html">Accueil</a>
  <a href="produits.html">Produits</a>
  <a href="agriculteurs.html">Agriculteurs</a>
  <a href="contact.html">Contact</a>
</nav>

<h1>Nos Agriculteurs 🌾</h1>

<h2>Filtrer les produits sur la carte</h2>
<input type="text" id="searchMap" placeholder="Tapez un produit (ex: Tomate)">

<div id="map"></div>

<script>
// Ancien code carte commenté
// L.marker([lat, lng]).addTo(map)...

var map = L.map('map').setView([14.4974, -14.4524], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

fetch('agriculteurs.json')
.then(res => res.json())
.then(data => {

const searchMap = document.getElementById('searchMap');

function afficherCarte(filtre = "") {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(a => {
        const produitsFiltres = a.produits.filter(p => p.nom.toLowerCase().includes(filtre.toLowerCase()));
        if(produitsFiltres.length > 0) {
            let popupHTML = `<b>${a.nom}</b><br>Région : ${a.region}<br>`;
            produitsFiltres.forEach(p => {
                popupHTML += `<hr>
                <img src="images/${p.image}" width="100"><br>
                ${p.nom}<br>
                <b>${p.prix}</b><br>`;
            });
            popupHTML += `<a href="https://wa.me/${a.telephone}">📞 Contacter</a>`;

            const marker = L.marker([a.lat, a.lng]).addTo(map).bindPopup(popupHTML);
            markers.push(marker);
        }
    });
}

afficherCarte("");
searchMap.addEventListener("input", () => {
    afficherCarte(searchMap.value);
});

});

// Ancien code popups commenté
// bindPopup("<b>Agriculteur</b> ...")
</script>

</body>
</html>
