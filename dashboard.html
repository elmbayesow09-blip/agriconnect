<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>📊 Dashboard Agriconnect</h1>

<div id="content"></div>

<script>
let role = localStorage.getItem("role");

let content = document.getElementById("content");

if(role === "agriculteur"){
    content.innerHTML = `
    <h2>👨‍🌾 Espace Agriculteur</h2>
    <p>✔ Proposer des prix</p>
    <p>✔ Ajouter des produits</p>
    <p>✔ Voir ses ventes</p>
    `;
}

if(role === "entreprise"){
    content.innerHTML = `
    <h2>🏢 Espace Entreprise</h2>
    <p>✔ Acheter des produits</p>
    <p>✔ Contacter agriculteurs</p>
    <p>✔ Suivre les marchés</p>
    `;
}

if(role === "admin"){
    content.innerHTML = `
    <h2>🧑‍💼 Admin</h2>
    <p>✔ Valider les prix</p>
    <p>✔ Voir toutes les commandes</p>
    <p>✔ Gérer la plateforme</p>
    `;
}
</script>

</body>
</html>
