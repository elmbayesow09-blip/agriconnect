<!DOCTYPE html>
<html>
<head>
<title>Dashboard Agriculteur</title>
<style>

body{font-family:Arial;background:#f4f4f4;text-align:center}

input{padding:10px;margin:10px}

button{background:#2e7d32;color:white;padding:10px;border:none}

</style>
</head>

<body>

<h2>Ajouter un produit</h2>

<input id="nom" placeholder="Nom du produit"><br>

<input id="description" placeholder="Description"><br>

<input id="prix" placeholder="Prix"><br>

<input id="image" placeholder="images/tomate.jpg"><br>

<button onclick="addProduct()">Ajouter</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, addDoc, collection }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD7ChJIlfTgvDgzQpyFV_Ol_7a46E2Qfj4",

authDomain: "agriconnect-933f0.firebaseapp.com",

projectId: "agriconnect-933f0",

storageBucket: "agriconnect-933f0.appspot.com",

messagingSenderId: "1028061092951",

appId: "1:1028061092951:web:66afa5dcf60dfeedfad712"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addProduct = async function(){

let nom=document.getElementById("nom").value;

let description=document.getElementById("description").value;

let prix=document.getElementById("prix").value;

let image=document.getElementById("image").value;

await addDoc(collection(db,"produits"),{

nom:nom,

description:description,

prix:prix,

image:image

});

alert("Produit ajouté");

}

</script>

</body>
</html>
